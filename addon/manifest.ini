name = logViewer
summary = "logViewer"
description = """Increase the efficiency of the NVDA LOG Viewer to be able to search. Add Bookmark to check the NVDA function.
Hot Keys:
CTRL+F : Open search Dialog
F3
Single Tap : Find next occurrence
Double Tap : copy Error Log Level
Shift+F3 : Find previous occurrence
CTRL+F2 : Add Bookmark
F2 : Move to next bookmark in log
Shift+F2 : Move to previous bookmark in log
NVDA+CTRL+L : open OldLog File"""
author = "Chai Chaimee & Pierre-Louis R."
url = https://github.com/chaichaimee/logViewer
version = 2026.5.4
changelog = """Fixed threading safety, I/O blocking, memory leaks, and config saving issues to ensure NVDA stability and proper bookmark/search behavior."""
